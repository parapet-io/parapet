name: Scala CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt test

      - name: Dump scheduler failure logs
        if: failure()
        run: |
          ls -R target/scheduler-failures || true
          cat target/scheduler-failures/*.log || true

      - name: Upload scheduler failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-failure-logs
          path: target/scheduler-failures/**/*.log
          if-no-files-found: ignore
