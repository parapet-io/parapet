name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'parapet-io/parapet'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Import GPG key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --yes --import
          gpgconf --kill gpg-agent || true

      - name: Validate tag matches version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          version="$(sbt --batch 'print ThisBuild / version' | awk '/ThisBuild \/ version/{getline; gsub(/^[[:space:]]+|[[:space:]]+$/, ""); print; exit}')"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$version" != "$tag" ]]; then
            echo "Git tag '$GITHUB_REF_NAME' does not match sbt version '$version'."
            exit 1
          fi

      - name: Run core tests
        run: sbt 'parapetCore/test' 'parapetNet/test'

      - name: Run Cats Effect tests
        run: sbt 'parapetCatsEffect/test'

      - name: Run ParIO tests
        run: sbt 'parapetPario/test'

      - name: Publish signed artifacts
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          set -euo pipefail
          version="$(sbt --batch 'print ThisBuild / version' | awk '/ThisBuild \/ version/{getline; gsub(/^[[:space:]]+|[[:space:]]+$/, ""); print; exit}')"
          if [[ "$version" == *-SNAPSHOT ]]; then
            sbt publishSigned
          else
            sbt publishSigned sonaRelease
          fi
