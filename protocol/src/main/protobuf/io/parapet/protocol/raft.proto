syntax = "proto3";

package io.parapet.protocol.raft;

option java_multiple_files = true;
option java_package = "io.parapet.protocol.raft";

message RaftLogEntry {
  uint32 index = 1;
  uint64 term = 2;
  bytes command = 3;
}

message VoteRequest {
  string candidate_id = 1;
  uint64 term = 2;
  uint32 last_log_index = 3;
  uint64 last_log_term = 4;
}

message VoteResponse {
  string voter_id = 1;
  uint64 term = 2;
  bool granted = 3;
}

message LogRequest {
  string leader_id = 1;
  uint64 term = 2;
  uint32 prefix_len = 3;
  uint64 prefix_term = 4;
  uint32 leader_commit = 5;
  repeated RaftLogEntry suffix = 6;
}

message LogResponse {
  string follower_id = 1;
  uint64 term = 2;
  uint32 ack = 3;
  bool success = 4;
}

message RaftEnvelope {
  uint32 protocol_version = 1;
  string group_id = 2;

  oneof message {
    VoteRequest vote_request = 10;
    VoteResponse vote_response = 11;
    LogRequest log_request = 12;
    LogResponse log_response = 13;
  }
}
